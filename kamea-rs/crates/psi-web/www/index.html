<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ψ∗ Debugger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Ψ∗ Debugger</h1>
        <div class="controls">
            <button id="btn-run" title="Run to completion (Ctrl+Enter)">▶ Run</button>
            <button id="btn-reset" title="Reset machine">↺ Reset</button>
            <button id="btn-table" title="Show Cayley table">Table</button>
            <select id="examples">
                <option value="">Load example...</option>
                <option value="basic">Basic</option>
                <option value="arithmetic">Arithmetic</option>
                <option value="functions">Functions</option>
                <option value="recursion">Recursion</option>
                <option value="fibonacci">Fibonacci</option>
                <option value="higher">Higher-order</option>
                <option value="types">Types</option>
                <option value="hello">Hello World</option>
            </select>
        </div>
    </header>

    <main>
        <div class="left-pane">
            <section class="panel source-panel">
                <h2>Source (Mini-Lisp)</h2>
                <textarea id="source" spellcheck="false" placeholder="; Type Ψ∗ Mini-Lisp here...&#10;(defun fib (n)&#10;  (if (< n 2) n&#10;      (+ (fib (- n 1))&#10;         (fib (- n 2)))))&#10;(fib 10)"></textarea>
            </section>
        </div>
        <div class="right-pane">
            <section class="panel output-panel">
                <h2>Output</h2>
                <pre id="output"></pre>
            </section>
            <section class="panel tree-panel">
                <h2>Term Tree <span id="tree-label" class="tree-label"></span></h2>
                <div id="term-tree" class="term-tree"></div>
            </section>
        </div>
    </main>

    <footer id="stats">Ready</footer>

    <!-- Cayley Table Modal -->
    <div id="table-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cayley Table (Ψ₁₆ᶠ)</h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="cayley-container"></div>
        </div>
    </div>

    <script src="debugger.js"></script>
</body>
</html>
